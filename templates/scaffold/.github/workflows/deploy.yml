name: Deploy
on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: fluxomind/deploy-action@v1
        with:
          token: ${{ secrets.FLUXOMIND_DEPLOY_TOKEN }}
          environment: ${{ github.ref_type == 'tag' && 'production' || 'staging' }}
