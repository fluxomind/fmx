name: Release @fluxomind/cli
on:
  push:
    tags: ['cli-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao semver (sem prefixo cli-)'
        required: true
      tag:
        description: 'npm dist-tag (dev/alpha/beta/latest)'
        required: true
        default: 'alpha'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub Release
      id-token: write  # npm provenance (SLSA)
      packages: write  # GitHub Packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@fluxomind'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Determine version and tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#cli-v}"
            case "$VERSION" in
              *alpha*) TAG="alpha" ;;
              *beta*)  TAG="beta" ;;
              *)
                if [[ "$VERSION" =~ ^0\.1\. ]]; then TAG="dev"; else TAG="latest"; fi
                ;;
            esac
          else
            VERSION="${{ inputs.version }}"
            TAG="${{ inputs.tag }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sync package version
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish to npm (public) with provenance
        run: npm publish --access public --tag "${{ steps.meta.outputs.tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mirror to GitHub Packages
        run: |
          echo "@fluxomind:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm publish --tag "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.tag != 'latest' }}
          tag_name: ${{ github.ref_name }}
          body: |
            Install: `npm install -g @fluxomind/cli@${{ steps.meta.outputs.tag }}`
            Full changelog: see auto-generated notes above.
